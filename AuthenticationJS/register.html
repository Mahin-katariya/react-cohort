<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/style.css">
    <title>authenticationjs</title>
  </head>
  <body>
    <div class="auth-container">
    <div class="auth-image-panel">
        <h1>Find Your Perfect Property Today</h1>
    </div>

    <div class="auth-form-panel">
        <div class="form-wrapper">
            <h2>Create Your Account</h2>
            <p class="subtitle">Join EstateSpace and start exploring the best real estate opportunities.</p>

            <form id="register-form">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="tanyahill_99" required>
                </div>

                <div class="input-group">
                    <label for="email">Your email</label>
                    <input type="email" id="email" name="email" placeholder="tanya.hill@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Create Account</button>
            </form>

            <p class="login-link">Already have an account? <a href="#">Login</a></p>
        </div>
    </div>
</div>
    <script type="module" src="/src/register.js"></script>
  </body>
</html>
